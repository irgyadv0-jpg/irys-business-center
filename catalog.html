<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#FAFAFA;color:#18181B;line-height:1.6}
        .header{padding:32px 24px;text-align:center;border-bottom:1px solid #E4E4E7;background:#fff}
        .header h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px}
        .header p{color:#71717A;font-size:0.9rem}
        .container{max-width:960px;margin:0 auto;padding:24px}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .card{background:#fff;border:1px solid #E4E4E7;border-radius:14px;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s}
        .card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.08);transform:translateY(-2px)}
        .card-img{height:200px;background:#F4F4F5;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .card-img img{width:100%;height:100%;object-fit:cover}
        .card-img svg{width:48px;height:48px;color:#A1A1AA}
        .card-badge{position:absolute;top:10px;right:10px;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;background:#fff;border:1px solid #E4E4E7;color:#52525B}
        .card-body{padding:16px}
        .card-sku{font-size:0.72rem;color:#A1A1AA;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
        .card-name{font-size:1.05rem;font-weight:700;margin:4px 0}
        .card-desc{font-size:0.82rem;color:#71717A;margin-bottom:12px}
        .card-prices{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid #F4F4F5;padding-top:12px}
        .price-sell{font-size:1.15rem;font-weight:800;color:#7C3AED}
        .price-reseller{font-size:0.82rem;color:#059669;font-weight:600}
        .detail-section{margin-top:20px;padding:20px;background:#fff;border:1px solid #E4E4E7;border-radius:14px}
        .detail-section h3{font-size:0.92rem;font-weight:700;margin-bottom:8px;color:#18181B}
        .detail-section p,.detail-section pre{font-size:0.85rem;color:#52525B;white-space:pre-wrap;line-height:1.6}
        .kit-links{display:flex;flex-direction:column;gap:8px;margin-top:8px}
        .kit-link{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#F4F4F5;border-radius:8px;color:#7C3AED;font-size:0.85rem;font-weight:500;text-decoration:none;transition:background 0.12s}
        .kit-link:hover{background:#E4E4E7}
        .empty{text-align:center;padding:60px 24px;color:#A1A1AA}
        .empty p{font-size:1rem}
        .footer{text-align:center;padding:32px;color:#A1A1AA;font-size:0.78rem;border-top:1px solid #E4E4E7;margin-top:40px}
        @media(max-width:640px){.grid{grid-template-columns:1fr}.container{padding:16px}}
    </style>
</head>
<body>
    <div class="header">
        <h1 id="catTitle">Katalog Produk</h1>
        <p id="catSubtitle">Loading...</p>
    </div>
    <div class="container">
        <div class="grid" id="catGrid"></div>
        <div id="catDetails"></div>
    </div>
    <div class="footer">
        <p>Powered by Business Center</p>
    </div>
    <script>
    const params = new URLSearchParams(window.location.search);
    const bizKey = params.get('biz') || 'irys';

    const BIZ_NAMES = { irys: 'IRYS Fragrance', dropship: 'Dropship Marketplace', matcha: 'Toko Matcha' };

    document.getElementById('catTitle').textContent = BIZ_NAMES[bizKey] || 'Katalog Produk';
    document.getElementById('catSubtitle').textContent = 'Katalog & Price List';

    const raw = localStorage.getItem('bc-data-' + bizKey);
    const data = raw ? JSON.parse(raw) : {};
    const products = data.products || [];

    const grid = document.getElementById('catGrid');
    const details = document.getElementById('catDetails');

    if (products.length === 0) {
        grid.innerHTML = '<div class="empty"><p>Belum ada produk di katalog ini.</p></div>';
    } else {
        grid.innerHTML = products.map((p, i) => {
            const imgHtml = p.image
                ? '<img src="' + p.image + '" alt="' + (p.name || '') + '">'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg>';

            return '<div class="card" style="position:relative;cursor:pointer" onclick="showDetail(' + i + ')">' +
                (p.badge ? '<span class="card-badge">' + p.badge + '</span>' : '') +
                '<div class="card-img">' + imgHtml + '</div>' +
                '<div class="card-body">' +
                (p.sku ? '<div class="card-sku">' + p.sku + '</div>' : '') +
                '<div class="card-name">' + (p.name || '') + '</div>' +
                '<div class="card-desc">' + (p.desc || '') + '</div>' +
                '<div class="card-prices">' +
                '<span class="price-sell">Rp' + (p.sell || 0).toLocaleString('id-ID') + '</span>' +
                (p.reseller ? '<span class="price-reseller">Reseller: Rp' + p.reseller.toLocaleString('id-ID') + '</span>' : '') +
                '</div></div></div>';
        }).join('');
    }

    function showDetail(idx) {
        const p = products[idx];
        if (!p) return;

        let html = '<div class="detail-section"><h3>' + (p.name || '') + '</h3>';
        if (p.sku) html += '<p style="color:#A1A1AA;font-size:0.78rem;margin-bottom:8px">SKU: ' + p.sku + '</p>';
        if (p.desc) html += '<p style="margin-bottom:8px">' + p.desc + '</p>';
        if (p.detail) html += '<pre>' + p.detail + '</pre>';

        html += '<div style="margin-top:16px;display:flex;gap:16px;flex-wrap:wrap">';
        html += '<div><span style="font-size:0.75rem;color:#A1A1AA">Harga Jual</span><div style="font-size:1.2rem;font-weight:800;color:#7C3AED">Rp' + (p.sell || 0).toLocaleString('id-ID') + '</div></div>';
        if (p.reseller) html += '<div><span style="font-size:0.75rem;color:#A1A1AA">Harga Reseller</span><div style="font-size:1.2rem;font-weight:800;color:#059669">Rp' + p.reseller.toLocaleString('id-ID') + '</div></div>';
        html += '</div></div>';

        if (p.landing) {
            html += '<div class="detail-section"><h3>Landing Page</h3><a href="' + p.landing + '" target="_blank" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#7C3AED;color:#fff;border-radius:8px;font-weight:600;text-decoration:none;font-size:0.9rem">Buka Landing Page &rarr;</a></div>';
        }

        if (p.knowledge) {
            html += '<div class="detail-section"><h3>Product Knowledge</h3><pre>' + p.knowledge + '</pre></div>';
        }

        const hasKit = p.photos || p.content || p.video;
        if (hasKit) {
            html += '<div class="detail-section"><h3>Marketing Kit</h3><div class="kit-links">';
            if (p.photos) html += '<a class="kit-link" href="' + p.photos + '" target="_blank">Foto Produk</a>';
            if (p.content) html += '<a class="kit-link" href="' + p.content + '" target="_blank">Konten Foto</a>';
            if (p.video) html += '<a class="kit-link" href="' + p.video + '" target="_blank">Video Produk</a>';
            html += '</div></div>';
        }

        details.innerHTML = html;
        details.scrollIntoView({ behavior: 'smooth' });
    }
    </script>
</body>
</html>
